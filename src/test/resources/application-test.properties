# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=studio
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Create the studio schema before Hibernate validates
spring.sql.init.mode=always
spring.task.scheduling.enabled=false
debtor.batch.run-on-startup=false

# Application
spring.application.name=student-mgmt-test
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Currency ? overridden in integration tests via @MockBean
currency.api.base-url=http://localhost:0/v6/latest
currency.cache-ttl-minutes=0

