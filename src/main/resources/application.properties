
#  Server
server.port=${SERVER_PORT:8080}

#  PostgreSQL 
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5433}/${POSTGRES_DB:studio_db}
spring.datasource.username=${POSTGRES_USER:studio_user}
spring.datasource.password=${POSTGRES_PASSWORD:studio_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

#  JPA / Hibernate  (schema is managed by db/init scripts; Hibernate only validates)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=studio
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#  Application
spring.application.name=student-mgmt

#  Timezone (server stores UTC, API converts to client timezone)
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
