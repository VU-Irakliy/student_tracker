#  Server
server.port=8080

#  PostgreSQL 
spring.datasource.url=jdbc:postgresql://localhost:5432/studio_db
spring.datasource.username=studio_user
spring.datasource.password=studio_pass
spring.datasource.driver-class-name=org.postgresql.Driver

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#  Application
spring.application.name=student-mgmt

#  Timezone (server stores UTC, API converts to client timezone)
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
